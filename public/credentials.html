<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permissionless — Credentials</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --blue:#2563eb;
      --red:#dc2626;
      --green:#16a34a;
      --amber:#d97706;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --radius: 12px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family:var(--sans);
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 48px;}
    .top{
      display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
      padding:12px 4px 16px;
    }
    h1{margin:0;font-size:20px;letter-spacing:-0.3px;}
    .sub{color:var(--muted);font-size:13px;margin-top:4px;}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
    button{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      cursor:pointer;
    }
    button.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
    button.danger{background:#fff;border-color:#fecaca;color:var(--red);}
    button:disabled{opacity:0.6;cursor:not-allowed;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
    }
    table{width:100%;border-collapse:collapse;}
    th,td{padding:12px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
    th{font-size:12px;color:var(--muted);text-align:left;font-weight:600;letter-spacing:0.02em;}
    td{font-size:13px;}
    tr:last-child td{border-bottom:none;}
    .mono{font-family:var(--mono);font-size:12px;}
    .pill{
      display:inline-flex;align-items:center;gap:6px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:3px 10px;
      font-size:12px;
      color:var(--muted);
      background:#fff;
      white-space:nowrap;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--muted);}
    .dot.green{background:var(--green);}
    .dot.red{background:var(--red);}
    .dot.amber{background:var(--amber);}
    .age.red{color:var(--red);font-weight:600;}
    .age.amber{color:var(--amber);font-weight:600;}
    .row-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
    .row-actions button{padding:8px 10px;border-radius:9px;}
    .empty{padding:22px;color:var(--muted);text-align:center;}
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(17,24,39,0.35);
      display:none;align-items:center;justify-content:center;padding:16px;
    }
    .modal{
      width:100%;max-width:520px;background:#fff;border-radius:14px;border:1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow:hidden;
    }
    .modal h2{margin:0;font-size:16px;}
    .modal .hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal .bd{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
    label{font-size:12px;color:var(--muted);font-weight:600;}
    input,textarea{
      width:100%;box-sizing:border-box;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      font-family:var(--mono);
    }
    textarea{min-height:64px;font-family:var(--sans);line-height:1.4;}
    .modal .ft{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
    .hint{font-size:12px;color:var(--muted);}
    .warn{font-size:12px;color:var(--amber);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Credentials</h1>
        <div class="sub">Local-only Keychain-backed secrets for Claude MCP servers</div>
      </div>
      <div class="actions">
        <button onclick="openAdd()">+ Add</button>
        <button class="primary" id="injectBtn" onclick="inject()">Inject into Claude config</button>
        <button onclick="refresh()">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div id="content"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="hd">
        <h2 id="modalTitle">Add credential</h2>
        <button onclick="closeModal()">Close</button>
      </div>
      <div class="bd">
        <div>
          <label>Account (env var name)</label>
          <input id="fAccount" placeholder="e.g. NOTION_API_KEY" autocomplete="off" />
        </div>
        <div id="secretRow">
          <label>Secret</label>
          <input id="fSecret" placeholder="paste secret here" autocomplete="off" />
          <div class="warn">Tip: this stays local, but it will be visible in your browser until you close this dialog.</div>
        </div>
        <div>
          <label>MCP assignment(s) (comma-separated)</label>
          <input id="fMcp" placeholder="e.g. notion, github" autocomplete="off" />
          <div class="hint">Used by “Inject” to know which MCP entries to wrap.</div>
        </div>
      </div>
      <div class="ft">
        <button id="saveBtn" class="primary" onclick="save()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let state = { mode: 'add', rotateAccount: null };

    function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function pill(label, dotClass){
      return `<span class="pill"><span class="dot ${dotClass||''}"></span>${esc(label)}</span>`;
    }
    function ageClass(days){
      if (days == null) return '';
      if (days > 90) return 'red';
      if (days > 60) return 'amber';
      return '';
    }

    async function api(method, path, body){
      const res = await fetch(path, {
        method,
        headers: body ? {'Content-Type':'application/json'} : undefined,
        body: body ? JSON.stringify(body) : undefined
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function refresh(){
      const rows = await api('GET', '/api/credentials');
      const el = document.getElementById('content');
      if (!rows || rows.length === 0){
        el.innerHTML = `<div class="empty">No credentials yet. Click “Add” to store one in Keychain.</div>`;
        return;
      }
      el.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Account</th>
              <th>MCP</th>
              <th>Date added</th>
              <th>Last rotated</th>
              <th>Age</th>
              <th>Status</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => {
              const age = r.rotation_age_days;
              const ageCls = ageClass(age);
              const mcp = (r.mcp_assignment||[]).join(', ') || '—';
              const statusBits = [];
              statusBits.push(r.in_keychain ? pill('In Keychain', 'green') : pill('Missing from Keychain', 'red'));
              if (r.plaintext_in_config) statusBits.push(pill('Plaintext in config', 'amber'));
              else if (r.using_launcher) statusBits.push(pill('Launcher injected', 'green'));
              return `
                <tr>
                  <td class="mono">${esc(r.account)}</td>
                  <td>${esc(mcp)}</td>
                  <td>${esc(r.date_added || '—')}</td>
                  <td>${esc(r.last_rotated || '—')}</td>
                  <td class="${ageCls ? 'age '+ageCls : ''}">${age == null ? '—' : esc(age + 'd')}</td>
                  <td>${statusBits.join(' ')}</td>
                  <td>
                    <div class="row-actions">
                      <button onclick="openRotate('${esc(r.account)}')">Rotate</button>
                      <button class="danger" onclick="removeCred('${esc(r.account)}')">Remove</button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function openAdd(){
      state = { mode:'add', rotateAccount:null };
      document.getElementById('modalTitle').textContent = 'Add credential';
      document.getElementById('secretRow').style.display = '';
      document.getElementById('fAccount').value = '';
      document.getElementById('fSecret').value = '';
      document.getElementById('fMcp').value = '';
      document.getElementById('modal').style.display = 'flex';
      setTimeout(() => document.getElementById('fAccount').focus(), 0);
    }

    function openRotate(account){
      state = { mode:'rotate', rotateAccount:account };
      document.getElementById('modalTitle').textContent = 'Rotate credential';
      document.getElementById('secretRow').style.display = '';
      document.getElementById('fAccount').value = account;
      document.getElementById('fAccount').disabled = true;
      document.getElementById('fSecret').value = '';
      document.getElementById('fMcp').value = '';
      document.getElementById('modal').style.display = 'flex';
      setTimeout(() => document.getElementById('fSecret').focus(), 0);
    }

    function closeModal(){
      document.getElementById('modal').style.display = 'none';
      document.getElementById('fAccount').disabled = false;
      document.getElementById('fSecret').value = '';
    }

    async function save(){
      const account = (document.getElementById('fAccount').value || '').trim();
      const secret = (document.getElementById('fSecret').value || '');
      const mcp = (document.getElementById('fMcp').value || '').trim();
      const mcp_assignment = mcp ? mcp.split(',').map(s => s.trim()).filter(Boolean) : [];

      document.getElementById('saveBtn').disabled = true;
      try{
        if (state.mode === 'rotate'){
          await api('POST', '/api/credentials/rotate', { account, secret });
        } else {
          await api('POST', '/api/credentials', { account, secret, mcp_assignment });
        }
        closeModal();
        await refresh();
      } finally {
        document.getElementById('saveBtn').disabled = false;
      }
    }

    async function removeCred(account){
      if (!confirm(`Remove ${account}? This deletes it from Keychain and metadata.`)) return;
      await api('DELETE', '/api/credentials/' + encodeURIComponent(account));
      await refresh();
    }

    async function inject(){
      const btn = document.getElementById('injectBtn');
      btn.disabled = true;
      try{
        const r = await api('POST', '/api/inject', {});
        alert(`Config updated. Injected ${r.injected} MCP entr${r.injected===1?'y':'ies'}.\n\nRestart Claude Desktop to apply.`);
      } finally {
        btn.disabled = false;
      }
    }

    refresh().catch(err => {
      document.getElementById('content').innerHTML = `<div class="empty">Couldn’t load credentials: ${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
