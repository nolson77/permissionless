<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permissionless</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #F2F2F7;
  --surface:      #FFFFFF;
  --primary:      #007AFF;
  --green:        #34C759;
  --orange:       #FF9500;
  --red:          #FF3B30;
  --indigo:       #5856D6;
  --gray-1:       #1C1C1E;
  --gray-2:       #3A3A3C;
  --gray-3:       #636366;
  --gray-4:       #8E8E93;
  --gray-5:       #AEAEB2;
  --gray-6:       #D1D1D6;
  --gray-7:       #E5E5EA;
  --gray-8:       #F2F2F7;
  --separator:    rgba(60,60,67,0.13);
  --radius:       13px;
  --radius-sm:    8px;
  --font:         -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  --shadow:       0 2px 16px rgba(0,0,0,0.08);
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.06);
  --transition:   0.22s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--gray-1);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
  background: rgba(242,242,247,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--separator);
  position: sticky; top: 0; z-index: 100;
  min-height: 52px;
}
.topbar-left { display: flex; align-items: center; gap: 6px; }
.back-btn {
  display: none; align-items: center; gap: 2px;
  background: none; border: none; color: var(--primary);
  font-size: 17px; font-family: var(--font); cursor: pointer;
  padding: 4px 0; letter-spacing: -0.2px;
}
.back-btn.visible { display: flex; }
.back-arrow { font-size: 18px; line-height: 1; margin-top: -1px; }
.wordmark {
  font-size: 17px; font-weight: 700; color: var(--gray-1);
  letter-spacing: -0.8px;
}
.wordmark span { color: var(--primary); }

.scroll-area {
  flex: 1; overflow-y: auto;
  padding: 0 0 40px;
  -webkit-overflow-scrolling: touch;
}

/* ── Bottom tab bar ──────────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: rgba(242,242,247,0.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--separator);
  padding: 8px 0 12px;
  flex-shrink: 0;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 0; cursor: pointer; background: none; border: none;
  font-family: var(--font); color: var(--gray-4);
  transition: color var(--transition);
}
.tab-item.active { color: var(--primary); }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
.tab-bar.hidden { display: none; }

/* ── Sections ─────────────────────────────────────────────────────────────── */
.section { padding: 0 16px; margin-top: 28px; }
.section-header {
  font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--gray-4); text-transform: uppercase;
  padding: 0 4px; margin-bottom: 8px;
}

/* ── Cards ────────────────────────────────────────────────────────────────── */
.card-group {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-row {
  display: flex; align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  text-decoration: none; color: inherit;
}
.card-row:not(:last-child)::after {
  content: '';
  position: absolute; bottom: 0; left: 56px; right: 0;
  height: 1px; background: var(--separator);
}
.card-row:active { background: var(--gray-8); }

.card-icon {
  width: 38px; height: 38px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; margin-right: 13px;
  background: var(--gray-8);
}
.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 17px; font-weight: 500; color: var(--gray-1);
  letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-sub {
  font-size: 14px; color: var(--gray-4); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.chevron { color: var(--gray-5); font-size: 14px; font-weight: 600; }

/* ── Badges ───────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
  border-radius: 20px; padding: 2px 8px; line-height: 1.4;
}
.badge-red    { background: rgba(255,59,48,0.12);  color: var(--red);    }
.badge-orange { background: rgba(255,149,0,0.14);  color: #CC7700;       }
.badge-green  { background: rgba(52,199,89,0.14);  color: #228B22;       }
.badge-gray   { background: rgba(142,142,147,0.14);color: var(--gray-3); }
.badge-blue   { background: rgba(0,122,255,0.12);  color: var(--primary);}
.badge-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dot-red    { background: var(--red);    }
.dot-orange { background: var(--orange); }

/* ── Attention banner ─────────────────────────────────────────────────────── */
.attention-card {
  margin: 20px 16px 0;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.attention-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--separator);
  display: flex; align-items: center; gap: 8px;
}
.attention-title { font-size: 15px; font-weight: 600; color: var(--gray-1); }
.attention-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; cursor: pointer;
  transition: background var(--transition);
}
.attention-row:not(:last-child) { border-bottom: 1px solid var(--separator); }
.attention-row:active { background: var(--gray-8); }
.attention-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
.attention-body { flex: 1; }
.attention-msg { font-size: 15px; font-weight: 500; color: var(--gray-1); }
.attention-sub { font-size: 13px; color: var(--gray-4); margin-top: 2px; }

/* ── Hero stat row ─────────────────────────────────────────────────────────── */
.stat-row {
  display: flex; gap: 10px;
  padding: 20px 16px 0;
}
.stat-card {
  flex: 1; background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  box-shadow: var(--shadow-sm);
}
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--gray-1); }
.stat-value.red    { color: var(--red);    }
.stat-value.orange { color: var(--orange); }
.stat-label { font-size: 12px; color: var(--gray-4); margin-top: 2px; font-weight: 500; }

/* ── Greeting ─────────────────────────────────────────────────────────────── */
.greeting { padding: 22px 20px 0; }
.greeting-line { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; color: var(--gray-1); }
.greeting-sub  { font-size: 15px; color: var(--gray-4); margin-top: 4px; }

/* ── Detail page ──────────────────────────────────────────────────────────── */
.detail-hero {
  padding: 24px 20px 20px;
  display: flex; align-items: center; gap: 16px;
}
.detail-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--gray-8);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.detail-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.detail-sub  { font-size: 15px; color: var(--gray-4); margin-top: 3px; }

.info-card {
  margin: 0 16px 0;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.info-row {
  display: flex; align-items: flex-start;
  padding: 12px 16px; gap: 12px;
}
.info-row:not(:last-child) { border-bottom: 1px solid var(--separator); }
.info-label {
  font-size: 15px; color: var(--gray-4); flex-shrink: 0;
  width: 110px; padding-top: 1px;
}
.info-value { font-size: 15px; color: var(--gray-1); font-weight: 500; flex: 1; }
.info-value.mono { font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; color: var(--gray-3); word-break: break-all; }
.info-value.warning { color: var(--orange); }
.info-value.danger  { color: var(--red);    }

/* ── Buttons ──────────────────────────────────────────────────────────────── */
.btn-group { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 10px; }
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 15px; border-radius: var(--radius);
  font-size: 17px; font-weight: 600; font-family: var(--font);
  cursor: pointer; border: none; transition: opacity var(--transition);
}
.btn:active { opacity: 0.75; }
.btn-primary   { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); }
.btn-danger    { background: var(--surface); color: var(--red);     box-shadow: var(--shadow-sm); }

/* ── Fab (add) ────────────────────────────────────────────────────────────── */
.fab {
  position: fixed; bottom: 80px; right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--primary); color: #fff;
  font-size: 26px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,122,255,0.4);
  cursor: pointer; border: none;
  transition: transform var(--transition), box-shadow var(--transition);
  z-index: 50;
}
.fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,122,255,0.3); }

/* ── Form ─────────────────────────────────────────────────────────────────── */
.form-group { padding: 0 16px; margin-top: 24px; }
.form-label {
  font-size: 13px; font-weight: 600; color: var(--gray-4);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 8px; display: block; padding: 0 4px;
}
.form-field {
  display: block; width: 100%;
  padding: 13px 16px;
  font-size: 17px; font-family: var(--font); color: var(--gray-1);
  background: var(--surface); border: none; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); outline: none;
  transition: box-shadow var(--transition);
}
.form-field:focus { box-shadow: 0 0 0 3px rgba(0,122,255,0.2); }
select.form-field { -webkit-appearance: none; appearance: none; cursor: pointer; }
textarea.form-field { resize: vertical; min-height: 80px; line-height: 1.5; }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 32px; text-align: center;
}
.empty-icon  { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-size: 20px; font-weight: 600; color: var(--gray-3); }
.empty-sub   { font-size: 15px; color: var(--gray-5); margin-top: 6px; }

/* ── Animations ──────────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fadeUp 0.28s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

/* ── Verified badge row ──────────────────────────────────────────────────── */
.verify-banner {
  margin: 16px 16px 0;
  background: rgba(255,149,0,0.1);
  border: 1px solid rgba(255,149,0,0.25);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.verify-banner-text { flex: 1; font-size: 14px; color: #CC7700; font-weight: 500; }

/* ── Risk indicator ──────────────────────────────────────────────────────── */
.risk-row { display: flex; align-items: center; gap: 6px; }

/* ── iOS Toggle Switch ───────────────────────────────────────────────────── */
.toggle-wrap {
  position: relative; display: inline-block;
  width: 51px; height: 31px; flex-shrink: 0;
}
.toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0;
  border-radius: 15.5px; background: var(--gray-6);
  cursor: pointer;
  transition: background 0.25s ease;
}
.toggle-track::after {
  content: '';
  position: absolute; left: 2px; top: 2px;
  width: 27px; height: 27px; border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.toggle-wrap input:checked + .toggle-track { background: var(--green); }
.toggle-wrap input:checked + .toggle-track::after { transform: translateX(20px); }

/* ── Restart notice ──────────────────────────────────────────────────────── */
.restart-notice {
  margin: 16px 16px 0;
  background: rgba(0,122,255,0.08);
  border: 1px solid rgba(0,122,255,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px; color: var(--primary); line-height: 1.5;
}

/* ── Tool permission segmented control ─────────────────────────────────── */
.tool-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; position: relative;
}
.tool-row:not(:last-child)::after {
  content: ''; position: absolute; bottom: 0; left: 16px; right: 0;
  height: 1px; background: var(--separator);
}
.tool-name { font-size: 15px; font-weight: 500; color: var(--gray-1); flex: 1; padding-right: 12px; }
.seg-ctrl {
  display: flex; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--separator); flex-shrink: 0;
}
.seg-btn {
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  border: none; background: transparent; cursor: pointer;
  color: var(--gray-3); transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.seg-btn:not(:last-child) { border-right: 1px solid var(--separator); }
.seg-btn.active-allow  { background: rgba(52,199,89,0.15);  color: #1a8f3c; }
.seg-btn.active-ask    { background: rgba(255,149,0,0.15);  color: #b36b00; }
.seg-btn.active-never  { background: rgba(255,59,48,0.15);  color: #c0392b; }

/* ── MCP card row (no separator offset for toggles) ─────────────────────── */
.mcp-row {
  display: flex; align-items: center;
  padding: 14px 16px;
  position: relative;
}
.mcp-row:not(:last-child)::after {
  content: '';
  position: absolute; bottom: 0; left: 16px; right: 0;
  height: 1px; background: var(--separator);
}
.mcp-row-left { flex: 1; min-width: 0; cursor: pointer; padding-right: 12px; }
.mcp-name { font-size: 17px; font-weight: 500; color: var(--gray-1); letter-spacing: -0.2px; }
.mcp-cmd  { font-size: 13px; color: var(--gray-4); margin-top: 2px; font-family: 'SF Mono', 'Menlo', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mcp-row.disabled .mcp-name { color: var(--gray-4); }
.mcp-row.disabled .mcp-cmd  { color: var(--gray-5); }

/* ── Activity feed ───────────────────────────────────────────────────────── */
.act-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
}
.act-row + .act-row { border-top: 1px solid var(--separator); }
.act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.act-body { flex: 1; min-width: 0; }
.act-tool {
  font-size: 14px; font-weight: 500;
  font-family: 'SF Mono', 'Menlo', monospace;
  letter-spacing: -0.3px; color: var(--gray-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.act-meta { font-size: 12px; color: var(--gray-4); margin-top: 2px; }
.act-agent { color: var(--gray-3); font-weight: 500; }
.act-time { font-size: 12px; color: var(--gray-5); flex-shrink: 0; white-space: nowrap; }

/* Filter chips */
.filter-row { display: flex; gap: 8px; padding: 8px 16px 4px; flex-wrap: wrap; overflow-x: auto; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 13px; border-radius: 20px; font-size: 13px; font-weight: 500;
  background: var(--gray-7); color: var(--gray-3);
  cursor: pointer; border: none; font-family: var(--font);
  transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
}
.filter-chip.active { background: var(--primary); color: #fff; }
.filter-chip:active { opacity: 0.7; }

/* Setup guide */
.setup-block {
  background: var(--surface); border-radius: var(--radius);
  padding: 18px; margin: 20px 16px 0; text-align: left;
  box-shadow: var(--shadow-sm);
}
.setup-title { font-size: 11px; font-weight: 600; color: var(--gray-4); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.setup-code {
  font-size: 11px; font-family: 'SF Mono', 'Menlo', monospace;
  background: var(--gray-8); border-radius: var(--radius-sm);
  padding: 10px 12px; overflow-x: auto; color: var(--gray-2);
  line-height: 1.65; white-space: pre;
}
.setup-note { font-size: 12px; color: var(--gray-5); margin-top: 10px; font-style: italic; }

/* ── Preset chips ────────────────────────────────────────────────────────── */
.preset-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 0 4px; margin-top: 10px;
}
.preset-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 500;
  background: rgba(0,122,255,0.1); color: var(--primary);
  cursor: pointer; border: none; font-family: var(--font);
  transition: background var(--transition);
}
.preset-chip:active { background: rgba(0,122,255,0.2); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="backBtn" onclick="goBack()">
        <span class="back-arrow">‹</span>
        <span id="backLabel">Back</span>
      </button>
      <span class="wordmark" id="wordmark">permission<span>less</span></span>
    </div>
    <div id="topbarRight"></div>
  </div>

  <div class="scroll-area" id="main"></div>

  <button class="fab" id="fab" onclick="showFabAction()" title="Add">+</button>

  <div class="tab-bar" id="tabBar">
    <button class="tab-item active" id="tab-home" onclick="switchTab('home')">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item" id="tab-mcps" onclick="switchTab('mcps')">
      <span class="tab-icon">🔌</span>
      <span class="tab-label">MCPs</span>
    </button>
    <button class="tab-item" id="tab-activity" onclick="switchTab('activity')">
      <span class="tab-icon">📡</span>
      <span class="tab-label">Activity</span>
    </button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  view: 'dashboard',
  tab: 'home',
  agent: null,
  permission: null,
  agents: [],
  dashboard: {},
  viewHistory: [],
  activityFilter: 'all',
};

// MCP list cache — populated by renderMCPManager, used by showMCPDetail
let _mcps = [];
// Currently-open MCP — lets the render dispatcher restore the detail view on back-nav
let _currentMcp = null;

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async get(path)        { const r = await fetch(path); return r.json(); },
  async post(path, body) { const r = await fetch(path, { method: 'POST',   headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
  async put(path, body)  { const r = await fetch(path, { method: 'PUT',    headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
  async del(path)        { const r = await fetch(path, { method: 'DELETE' }); return r.json(); },
};

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(view, data = {}) {
  state.viewHistory.push({ view: state.view, agent: state.agent, permission: state.permission });
  state.view = view;
  if (data.agent)      state.agent      = data.agent;
  if (data.permission) state.permission = data.permission;
  render();
}

function goBack() {
  const prev = state.viewHistory.pop();
  if (!prev) return;
  state.view       = prev.view;
  state.agent      = prev.agent;
  state.permission = prev.permission;
  render();
}

function switchTab(tab) {
  state.tab = tab;
  state.viewHistory = [];
  state.view = tab === 'home' ? 'dashboard' : tab === 'activity' ? 'activity' : 'mcp-manager';
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function riskBadge(level) {
  if (!level) return '';
  const cls = { High: 'red', Medium: 'orange', Low: 'green' }[level] || 'gray';
  return `<span class="badge badge-${cls}">${level} risk</span>`;
}
function statusBadge(status) {
  const cls = { Active: 'green', Inactive: 'gray', 'Needs Review': 'orange' }[status] || 'gray';
  return `<span class="badge badge-${cls}">${status}</span>`;
}
function accessBadge(level) {
  const cls = { Admin: 'red', Editor: 'blue', Viewer: 'green', 'Read-Only': 'green', API: 'blue' }[level] || 'gray';
  return `<span class="badge badge-${cls}">${level}</span>`;
}
function formatDate(d) {
  if (!d) return '<span style="color:var(--gray-5)">Not recorded</span>';
  return new Date(d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function cmdPreview(cfg) {
  if (!cfg) return '—';
  const parts = [cfg.command, ...(cfg.args || [])];
  const str = parts.filter(Boolean).join(' ');
  return str.length > 60 ? str.slice(0, 57) + '…' : str;
}

// ── Topbar ────────────────────────────────────────────────────────────────────
function updateTopbar(showBack, backLabel = 'Back', rightHtml = '') {
  const back     = document.getElementById('backBtn');
  const wordmark = document.getElementById('wordmark');
  const right    = document.getElementById('topbarRight');
  const tabBar   = document.getElementById('tabBar');

  if (showBack) {
    back.classList.add('visible');
    document.getElementById('backLabel').textContent = backLabel;
    wordmark.style.display = 'none';
    tabBar.classList.add('hidden');
  } else {
    back.classList.remove('visible');
    wordmark.style.display = '';
    tabBar.classList.remove('hidden');
  }
  right.innerHTML = rightHtml;
}

async function renderMCPManager() {
  updateTopbar(false);
  document.getElementById('fab').style.display = 'flex';

    api.get('/api/mcp'),
    api.get('/api/permissions?agent_id=claude')
  ]);
  _mcps = mcps; // cache for showMCPDetail
  const active   = mcps.filter(m => m.enabled);
  const disabled = mcps.filter(m => !m.enabled);

  // Find "native" connectors: Claude permissions with MCP tool that aren't in the config file
  const configNames = new Set(mcps.map(m => m.name.toLowerCase()));
  const nativePerms = allPerms.filter(p => {
    if (p.platform !== 'Claude Native') return false;
    const toolKey = p.tool.toLowerCase().replace(/\s+mcp$/i, '').replace(/\s+/g, '-');
    return !configNames.has(toolKey) && !configNames.has(p.tool.toLowerCase());
  });

  const mcpRow = (m) => `
    <div class="mcp-row ${m.enabled ? '' : 'disabled'}">

      <label class="toggle-wrap" title="${m.enabled ? 'Disable' : 'Enable'} ${m.name}">
        <input type="checkbox" ${m.enabled ? 'checked' : ''} onchange="toggleMCP('${m.name}', this)">

  const nativeRow = (p) => `

        <div class="mcp-cmd" style="color:#34c759">✓ Connected via Claude Settings</div>

      <span style="font-size:11px;color:#8e8e93;padding:4px 8px;background:#f2f2f7;border-radius:8px;white-space:nowrap">Native</span>
    </div>`;

  const emptyState = mcps.length === 0 && nativePerms.length === 0
    ? `<div class="empty animate">
        <div class="empty-icon">🔌</div>
        <div class="empty-title">No MCPs configured</div>

  document.getElementById('main').innerHTML = `
    <div class="greeting animate">
      <div class="greeting-line" style="font-size:24px">MCP Connections</div>
      <div class="greeting-sub">Tools Claude can use — toggle to pause without removing</div>
    </div>

    <div class="restart-notice animate">

    ${active.length > 0 ? `

      <div class="section-header">Active (${active.length})</div>
      <div class="card-group">${active.map(mcpRow).join('')}</div>

    ${disabled.length > 0 ? `
    <div class="section animate">
      <div class="section-header">Paused (${disabled.length})</div>
      <div class="card-group" style="opacity:0.7">${disabled.map(mcpRow).join('')}</div>
    </div>` : ''}

    ${nativePerms.length > 0 ? `

  if (_currentMcp) await renderMCPDetail(_currentMcp);

async function saveEditMCPEnv(name, envCount) {
  // Collect env vars from inputs
  const env = {};
  for (let i = 0; i < envCount; i++) {
    const k = document.getElementById(`env-key-${i}`)?.value.trim();
    const v = document.getElementById(`env-val-${i}`)?.value.trim();
    if (k) env[k] = v || '';
  }

  // Collect args
  const argsRaw = document.getElementById('edit-args')?.value.trim() || '';
  const args = argsRaw ? argsRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  // Build updated config (preserve command, update args + env)
  const mcp = _mcps.find(m => m.name === name);
  const updatedConfig = {
    command: mcp?.config?.command || 'npx',
    args,
    ...(Object.keys(env).length > 0 ? { env } : {}),
  };

  await api.put(`/api/mcp/${encodeURIComponent(name)}`, { config: updatedConfig });

  // Refresh MCP list cache and go back to detail
  const mcps = await api.get('/api/mcp');
  _mcps = mcps;
  const updated = mcps.find(m => m.name === name);
  goBack();
  if (updated) renderMCPDetail(updated);
}

function fillPreset(key) {
  const p = MCP_PRESETS[key];
  if (!p) return;
  document.getElementById('mcp-name').value = p.name;
  document.getElementById('mcp-cmdtype').value = p.cmd;
  document.getElementById('mcp-pkg').value = p.pkg;
  document.getElementById('mcp-args').value = p.args.join('\n');
  const envStr = Object.entries(p.env).map(([k, v]) => `${k}=${v}`).join('\n');
  document.getElementById('mcp-env').value = envStr;

async function saveMCP() {
  const name    = document.getElementById('mcp-name').value.trim();
  const cmdtype = document.getElementById('mcp-cmdtype').value;
  const pkg     = document.getElementById('mcp-pkg').value.trim();
  const argsRaw = document.getElementById('mcp-args').value.trim();
  const envRaw  = document.getElementById('mcp-env').value.trim();

  if (!name) return alert('Please enter a name.');
  if (!pkg)  return alert('Please enter a package or path.');

  const args = [pkg, ...argsRaw.split('\n').map(s => s.trim()).filter(Boolean)];

  const env = {};
  envRaw.split('\n').forEach(line => {
    const idx = line.indexOf('=');
    if (idx > 0) {
      const k = line.slice(0, idx).trim();
      const v = line.slice(idx + 1).trim();
      if (k) env[k] = v;
    }
  });

  const mcpConfig = { command: cmdtype, args };
  if (Object.keys(env).length > 0) mcpConfig.env = env;

  await api.post('/api/mcp', { name, config: mcpConfig });
  goBack();
}

// ── Activity Feed ─────────────────────────────────────────────────────────────

function relTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dateSectionLabel(d) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function setActivityFilter(f) {
  state.activityFilter = f;
  renderActivity();
}

async function renderActivity() {
  updateTopbar(false);
  document.getElementById('fab').style.display = 'none';

  const [events, agents] = await Promise.all([
    api.get('/api/activity'),
    api.get('/api/agents'),
  ]);

  const filter   = state.activityFilter || 'all';
  const filtered = filter === 'all' ? events : events.filter(e => e.agent_id === filter);
  const agentMap = {};
  agents.forEach(a => { agentMap[a.id] = a; });

  // Group by calendar day
  const groups = {};
  filtered.forEach(evt => {
    const d     = evt.timestamp ? new Date(evt.timestamp) : null;
    const label = d ? dateSectionLabel(d) : 'Unknown';
    if (!groups[label]) groups[label] = [];
    groups[label].push(evt);
  });

  const statusColor = s =>
    s === 'success' ? 'var(--green)' :
    s === 'error'   ? 'var(--red)'   : 'var(--orange)';

  const agentLabel = id => {
    const a = agentMap[id];
    return a ? `${a.icon} ${a.name}` : id;
  };

  const filterChips = [
    `<button class="filter-chip ${filter === 'all' ? 'active' : ''}" onclick="setActivityFilter('all')">All</button>`,
    ...agents.map(a =>
      `<button class="filter-chip ${filter === a.id ? 'active' : ''}" onclick="setActivityFilter('${a.id}')">${a.icon} ${a.name}</button>`
    )
  ].join('');

  const feedHtml = Object.entries(groups).map(([label, evts]) => `
    <div class="section animate">
      <div class="section-header">${label} <span style="font-weight:400;color:var(--gray-5)">(${evts.length})</span></div>
      <div class="card-group">
        ${evts.map(evt => `
          <div class="act-row">
            <span class="act-dot" style="background:${statusColor(evt.status)}"></span>
            <div class="act-body">
              <div class="act-tool">${evt.tool_name}</div>
              <div class="act-meta">
                <span class="act-agent">${agentLabel(evt.agent_id)}</span>
                <span style="color:var(--gray-6)"> · </span>
                <span>${evt.mcp_name}</span>
              </div>
            </div>
            <span class="act-time">${relTime(evt.timestamp)}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  const loggerPath = '~/Documents/Python/permissionless/src/logger.js';

  const setupHtml = `
    <div class="empty animate" style="padding-top:32px">
      <div class="empty-icon">📡</div>
      <div class="empty-title">No activity yet</div>
      <div class="empty-sub" style="max-width:270px">Wrap your MCPs with the Permissionless logger to automatically track every tool call</div>
    </div>
    <div class="setup-block animate">
      <div class="setup-title">Setup — wrap each MCP in claude_desktop_config.json</div>
      <div class="setup-title" style="margin-top:14px;color:var(--gray-5)">Before (original entry):</div>
      <pre class="setup-code">"notion": {
  "command": "npx",
  "args": ["-y", "@modelcontextprotocol/server-notion"],
  "env": { "NOTION_API_KEY": "sk-..." }
}</pre>
      <div class="setup-title" style="margin-top:14px;color:var(--primary)">After (wrapped with logger):</div>
      <pre class="setup-code">"notion": {
  "command": "node",
  "args": [
    "${loggerPath}",
    "notion",
    "npx", "-y", "@modelcontextprotocol/server-notion"
  ],
  "env": { "NOTION_API_KEY": "sk-..." }
}</pre>
      <div class="setup-note">Repeat for each MCP (notion, linear, github…), then restart Claude Desktop</div>
    </div>`;

  const totalCount  = events.length;
  const todayCount  = (groups['Today'] || []).length;
  const subtitle    = totalCount === 0
    ? 'No events logged yet'
    : `${totalCount.toLocaleString()} call${totalCount !== 1 ? 's' : ''} logged${todayCount > 0 ? ` · ${todayCount} today` : ''}`;

  document.getElementById('main').innerHTML = `
    <div class="greeting animate">
      <div class="greeting-line" style="font-size:24px">Activity</div>
      <div class="greeting-sub">${subtitle}</div>
    </div>

    ${totalCount > 0 ? `<div class="filter-row animate">${filterChips}</div>` : ''}

    ${totalCount === 0 ? setupHtml : ''}
    ${filtered.length === 0 && totalCount > 0
      ? `<div class="empty animate" style="padding-top:32px"><div class="empty-sub">No events for this agent</div></div>`
      : feedHtml
    }
  `;
}

  document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-5)">Loading…</div>';
  window.scrollTo(0, 0);

  try {
    switch (state.view) {
      case 'dashboard':         await renderDashboard();                        break;
      case 'agent-detail':      await renderAgentDetail();                      break;
      case 'permission-detail': await renderPermissionDetail();                 break;
      case 'add-agent':         renderAddAgent();                               break;
      case 'add-permission':    renderAddPermission(state.agent?.id);           break;
      case 'activity':          await renderActivity();                         break;
      case 'mcp-manager':       await renderMCPManager();                       break;
      case 'mcp-detail':    if (_currentMcp) renderMCPDetail(_currentMcp);                    break;
      case 'edit-mcp-env':  if (_currentMcp) renderEditMCPEnv(_currentMcp);                  break;
      case 'add-mcp':           renderAddMCP();                                  break;
    }
  } catch (err) {
    console.error('Render error:', err);
    document.getElementById('main').innerHTML = `
      <div class="empty" style="padding-top:60px">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Couldn't connect</div>
        <div class="empty-sub" style="max-width:240px">Make sure the server is running:<br><code style="font-size:12px;background:var(--gray-7);padding:3px 8px;border-radius:6px">npm start</code></div>
        <button class="btn btn-primary" style="margin-top:24px;width:auto;padding:12px 28px" onclick="render()">Try again</button>
      </div>`;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
